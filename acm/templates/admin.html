{{define "content"}}

<h1>Admin Dashboard</h1>

<h2>Users</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
    </tr>
    {{range .Users}}
    <tr>
        <td>{{.ID}}</td>
        <td>{{.Name}}</td>
        <td>{{.Email}}</td>
    </tr>
    {{end}}
</table>
<br>
<h2>Transactions</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>User ID</th>
        <th>Type</th>
        <th>Amount</th>
    </tr>

    {{range .Transactions}}
    <tr>
        <td>{{.ID}}</td>
        <td>{{.UserID}}</td>
        <td>{{.Type}}</td>
        <td>{{.Amount}}</td>
    </tr>
    {{end}}

</table>
{{end}}
