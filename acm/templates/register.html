{{define "content"}}
<form method="POST" action="/register">
    <label>Full Name</label>
    <br>
    <input type="text" name="name" required>
    <br><br>
    <label>Email</label>
    <br>
    <input type="email" name="email" required>
    <br><br>
    <input type="password" name="password" required>
    <br><br>
    <button type="submit">
        Register
    </button>
</form>
{{end}}
